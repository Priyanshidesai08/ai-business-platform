services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-business-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_business_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_business_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: ai-business-platform-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_business_platform
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: ai-business-platform-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
